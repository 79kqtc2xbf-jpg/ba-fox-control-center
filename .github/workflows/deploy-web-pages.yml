name: Deploy BA Fox Web Preview

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ba-fox-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static web bundle
        shell: bash
        env:
          BA_FOX_APPS_SCRIPT_ENDPOINT: ${{ secrets.BA_FOX_APPS_SCRIPT_ENDPOINT }}
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp -R web/. dist/
          cat > dist/config.local.js <<EOF
          window.BA_FOX_CONFIG = {
            APPS_SCRIPT_ENDPOINT: '${BA_FOX_APPS_SCRIPT_ENDPOINT}',
            USE_MOCK_DATA: false,
          };
          EOF
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
