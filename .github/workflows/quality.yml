name: Quality Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  python-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Python modules
        run: python -m compileall bot services
