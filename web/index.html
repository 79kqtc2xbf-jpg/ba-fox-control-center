<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BA Fox — Control Center</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <div>
        <p class="eyebrow">BA Fox / Executive Fox</p>
        <h1>Сегодня держим фокус спокойно 🦊</h1>
        <p class="hero-copy">Работа, личное, пуши и wait list — в одном мягком control center.</p>
      </div>
      <div class="date-pill" id="todayLabel">Сегодня</div>
    </section>

    <nav class="tabs" aria-label="Разделы BA Fox">
      <button class="tab active" data-tab="today">Сегодня</button>
      <button class="tab" data-tab="work">Работа</button>
      <button class="tab" data-tab="personal">Личное</button>
      <button class="tab" data-tab="push">Пуши</button>
      <button class="tab" data-tab="week">Неделя</button>
    </nav>

    <section class="dashboard-grid" id="summaryCards"></section>

    <section class="content-panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow" id="panelEyebrow">Сегодня</p>
          <h2 id="panelTitle">Фокус дня</h2>
        </div>
        <button class="ghost-button" id="resetDemo">Сбросить demo</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </section>

    <section class="quick-actions">
      <button class="action-button primary" id="copyDaily">Скопировать daily summary</button>
      <button class="action-button" id="copyMonday">Скопировать Monday checklist</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
