<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#070b1a" />
  <title>BA Fox - Control Center</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero-card">
      <div>
        <p class="eyebrow">BA Fox / Executive Fox</p>
        <h1>BA Fox Control Center</h1>
        <p class="hero-copy">Тихий обзор текущих задач и ожидаемых ответов.</p>
      </div>
      <div class="hero-status">
        <span class="read-only-pill" id="writeModePill">Только просмотр</span>
        <div class="date-pill" id="todayLabel">Время Бангкока</div>
        <button class="create-task-button" type="button" id="createTaskButton" disabled>+ Новая задача</button>
      </div>
    </header>

    <div class="mode-banner mock" id="modeBanner" role="status">
      <strong>Demo mode / mock data</strong>
      <span>Без подключения к рабочей таблице и без изменений задач.</span>
    </div>

    <nav class="tabs" aria-label="Разделы BA Fox">
      <button class="tab active" type="button" data-tab="today" aria-selected="true">Сегодня</button>
      <button class="tab" type="button" data-tab="documents" aria-selected="false">Документы</button>
      <button class="tab" type="button" data-tab="communication" aria-selected="false">Коммуникация</button>
      <button class="tab" type="button" data-tab="presentations" aria-selected="false">Презентации</button>
      <button class="tab" type="button" data-tab="brokers" aria-selected="false">Брокеры</button>
      <button class="tab" type="button" data-tab="reminders" aria-selected="false">Напомнить</button>
      <button class="tab" type="button" data-tab="completed" aria-selected="false">Выполненное</button>
      <button class="tab" type="button" data-tab="calendar" aria-selected="false">Календарь</button>
      <button class="tab" type="button" data-tab="system" aria-selected="false">Система</button>
    </nav>

    <section class="dashboard-grid" id="summaryCards" aria-label="Краткая сводка"></section>

    <section class="content-panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow" id="panelEyebrow">Сегодня</p>
          <h2 id="panelTitle">Задачи на сегодня</h2>
        </div>
        <span class="panel-badge" id="panelBadge">Read-only</span>
      </div>
      <div class="focus-note" id="statusMessage" role="status"></div>
      <div class="workspace-controls" id="workspaceControls"></div>
      <div class="task-list" id="taskList" aria-live="polite"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="createTaskModal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="createTaskTitle">
      <form id="createTaskForm" novalidate>
        <div class="modal-header">
          <div>
            <p class="eyebrow">BA Fox Web</p>
            <h2 id="createTaskTitle">Новая задача</h2>
          </div>
          <button class="modal-close" type="button" id="cancelCreateTaskTop" aria-label="Закрыть">×</button>
        </div>

        <label class="form-field">
          <span>Название задачи</span>
          <input type="text" name="title" autocomplete="off" required />
        </label>
        <label class="form-field">
          <span>Компания</span>
          <input type="text" name="organization" autocomplete="organization" />
        </label>
        <label class="form-field">
          <span>Следующее действие</span>
          <textarea name="nextAction" rows="3" required></textarea>
        </label>
        <label class="form-field">
          <span>Срок</span>
          <input type="date" name="deadline" />
        </label>

        <div class="modal-message" id="createTaskMessage" role="status"></div>
        <div class="modal-actions">
          <button class="secondary-button" type="button" id="cancelCreateTask">Отмена</button>
          <button class="primary-button" type="submit" id="submitCreateTask">Создать</button>
        </div>
      </form>
    </section>
  </div>

  <div class="modal-backdrop" id="editTaskModal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="editTaskTitle">
      <form id="editTaskForm" novalidate>
        <div class="modal-header">
          <div>
            <p class="eyebrow">BA Fox Web</p>
            <h2 id="editTaskTitle">Обновить этап</h2>
          </div>
          <button class="modal-close" type="button" id="closeEditTaskTop" aria-label="Закрыть">×</button>
        </div>

        <input type="hidden" name="taskId" />
        <div class="edit-task-body" id="editTaskBody"></div>

        <label class="form-field">
          <span>Что изменилось / новые данные</span>
          <textarea name="comment" rows="3" placeholder="Коротко: что стало известно, что поменялось, что важно помнить"></textarea>
        </label>
        <label class="form-field">
          <span>Новый следующий шаг</span>
          <textarea name="nextAction" rows="3" required></textarea>
        </label>
        <label class="form-field">
          <span>Срок контроля</span>
          <input type="date" name="deadline" />
        </label>
        <label class="form-field">
          <span>Приоритет</span>
          <select name="priority">
            <option value="">Без изменения</option>
            <option value="High">Высокий</option>
            <option value="Medium">Средний</option>
            <option value="Low">Низкий</option>
          </select>
        </label>
        <label class="form-field">
          <span>Раздел</span>
          <select name="category">
            <option value="">Без изменения</option>
            <option value="Документы">Документы</option>
            <option value="Коммуникация">Коммуникация</option>
            <option value="Презентации">Презентации</option>
            <option value="Брокеры">Брокеры</option>
            <option value="Напомнить">Напомнить</option>
            <option value="Другое">Другое</option>
          </select>
        </label>

        <div class="modal-message" id="editTaskMessage" role="status"></div>
        <div class="modal-actions">
          <button class="secondary-button" type="button" id="closeEditTask">Отмена</button>
          <button class="primary-button" type="submit" id="submitEditTask">Сохранить</button>
        </div>
      </form>
    </section>
  </div>

  <script src="config.runtime.js"></script>
  <script src="config.local.js"></script>
  <script src="api/baFoxConfig.js"></script>
  <script src="api/baFoxMockData.js"></script>
  <script src="api/baFoxUiState.js"></script>
  <script src="api/baFoxClient.js"></script>
  <script src="app.js"></script>
</body>
</html>
